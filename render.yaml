services:
  - type: web
    name: medimemory-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: DATA_DIR
        value: ./data
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_BASE_URL
        value: https://api.cognee.ai
      - key: FRONTEND_URL
        sync: false

